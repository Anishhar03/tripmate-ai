services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tripmate
      POSTGRES_USER: tripmate
      POSTGRES_PASSWORD: tripmate
    volumes:
      - tripmate_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmate"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  tripmate_data:
