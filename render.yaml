services:
  - type: web
    name: tripmate-ai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tripmate-ai-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://anishhar03.github.io
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

databases:
  - name: tripmate-ai-db
    databaseName: tripmate
    user: tripmate
