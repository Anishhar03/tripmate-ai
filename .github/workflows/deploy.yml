name: Validate and deploy TripMate AI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Validate JavaScript
        run: node --check app.js
      - name: Run dependency-free tests
        run: python -m unittest discover -s tests -v
      - name: Stage public site
        run: |
          mkdir -p _site/src _site/public
          cp index.html app.js sw.js _site/
          cp src/styles.css _site/src/
          cp public/favicon.svg public/manifest.webmanifest public/lucide.min.js public/*.jpg _site/public/
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
